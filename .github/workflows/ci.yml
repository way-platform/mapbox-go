name: CI

on:
  pull_request:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so commitlint can range over the PR's commits.
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build
        run: mise run build
